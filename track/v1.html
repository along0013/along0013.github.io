<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愉见未来+ · 读者追踪</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; color: #ccc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(217,119,87,0.4);
    border-radius: 12px; padding: 48px 32px; max-width: 400px;
  }
  h1 { color: #D97757; font-size: 20px; margin-bottom: 16px; }
  p { font-size: 14px; line-height: 1.8; color: #999; margin-bottom: 8px; }
  .count { font-size: 48px; color: #D97757; font-weight: 700; margin: 24px 0 8px; }
  .label { font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <h1>愉见未来+</h1>
  <p>你是第</p>
  <div class="count" id="c">?</div>
  <p class="label">位跑完三步自检的读者</p>
  <p style="margin-top:24px;font-size:12px;color:#555;">
    返回公众号，评论区告诉我你的自检结果。
  </p>
</div>
<script>
fetch('https://along0013.github.io/track/counter.json?t='+Date.now())
  .then(r=>r.json()).then(d=>{document.getElementById('c').textContent=d.count})
  .catch(()=>{document.getElementById('c').textContent='1'});
</script>
</body>
</html>
